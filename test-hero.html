<!--
  ============================================================
  MD NUTRITION — Hero scroll-scrub con producto a croma
  ============================================================
  Cómo integrar esto en tu web real:

  1. Sube el vídeo "md-shaker-final.mp4" a tu carpeta de assets
     (ej. /assets/video/md-shaker-final.mp4) y actualiza el
     atributo src del <video> más abajo con esa ruta real.

  2. Pega este bloque entero (HTML+CSS+JS) donde quieras que
     vaya el hero. Si ya tienes <head> y <script> propios, puedes
     mover el <style> al head y el <script> al final del body —
     funciona igual, está todo junto aquí solo para que sea
     fácil de copiar y probar de un golpe.

  3. Ajusta .hero-bg-real / el fondo de .chroma-stage para que
     case con el resto de tu home (ahora mismo lleva un color de
     ejemplo, cámbialo o quítalo si tu body ya tiene fondo).

  4. El texto "MD NUTRITION" está superpuesto como HTML real
     (no quemado en el vídeo), así que cámbialo, muévelo o
     restyle sin tocar el vídeo. Sus coordenadas (top/left/scale)
     están pensadas para la composición de ESTE vídeo en
     concreto — si cambias de vídeo, hay que reajustarlas.
  ============================================================
-->

<section class="chroma-stage-wrapper" id="chroma-stage-wrapper">
  <div class="chroma-sticky">
    <video
      id="md-source-video"
      src="md-shaker-final.mp4"
      muted
      playsinline
      preload="auto"
    ></video>

    <div class="chroma-canvas-holder" id="chroma-canvas-holder">
      <canvas id="md-output-canvas"></canvas>
      <div class="md-logo-overlay" id="md-logo-overlay">
        <span class="md-logo-main">MD</span>
        <span class="md-logo-sub">NUTRITION</span>
      </div>
    </div>
  </div>
</section>

<style>
  .chroma-stage-wrapper {
    position: relative;
    height: 400vh; /* duración del scroll-scrub. Sube/baja para más/menos "lento" */
  }
  .chroma-sticky {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #f4f1ec; /* TODO: pon aquí el fondo real de tu hero, o quita esta línea si el body ya lo tiene */
  }
  video#md-source-video {
    display: none; /* solo se usa como fuente de píxeles, nunca se ve directamente */
  }
  .chroma-canvas-holder {
    position: relative;
    max-width: 90%;
    max-height: 90%;
  }
  canvas#md-output-canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }
  .md-logo-overlay {
    position: absolute;
    /* Centrado en el cuerpo del vaso, más abajo que antes. Si al probar
       en tu pantalla real ves que no cae justo en el centro del vaso,
       ajusta solo el "top". */
    top: 68%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    color: #2e2e2e;
    font-family: Arial, Helvetica, sans-serif;
    text-shadow: 0 1px 2px rgba(255,255,255,0.4);
  }
  .md-logo-main {
    display: block;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .md-logo-sub {
    display: block;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    margin-top: 2px;
  }
</style>

<script>
(() => {
  const video = document.getElementById('md-source-video');
  const canvas = document.getElementById('md-output-canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const wrapper = document.getElementById('chroma-stage-wrapper');
  const logoOverlay = document.getElementById('md-logo-overlay');

  // ----------------------------------------------------------------
  // Color de croma medido directamente de tu vídeo final
  // (md-shaker-final.mp4). Si cambias de vídeo, vuelve a medir
  // el verde y actualiza estos 3 números.
  // ----------------------------------------------------------------
  const SOFTNESS_LO = 5;   // por debajo de esto, se considera producto (opaco)
  const SOFTNESS_HI = 40;  // por encima de esto, se considera fondo (transparente)

  // ----------------------------------------------------------------
  // En los primeros ~1.2s del vídeo aparece un trozo de mano en la
  // esquina superior izquierda mientras la cuchara se inclina. Esa
  // zona del frame (medida sobre el vídeo de 1440x1440) está vacía
  // de fondo el resto de los 10s, así que la forzamos siempre a
  // transparente en vez de recortar tiempo del vídeo.
  // ----------------------------------------------------------------
  // ----------------------------------------------------------------
  // En los primeros ~1.2s aparece un trozo de mano en la esquina
  // superior izquierda. En vez de una máscara con forma e intentar
  // adivinar el área exacta, cortamos con una línea vertical recta:
  // todo lo que hay a la izquierda de este punto se oculta siempre,
  // el resto del vídeo (incluido el vaso) nunca llega tan a la
  // izquierda, así que nunca se ve afectado.
  // ----------------------------------------------------------------
  const HAND_CUT_X = 225; // en coordenadas del vídeo nativo (1440px de ancho)

  let duration = 0;
  let targetTime = 0;
  let renderedTime = -1;
  let rafScheduled = false;
  let canvasW = 0, canvasH = 0;

  video.addEventListener('loadedmetadata', () => {
    duration = video.duration;
    resizeCanvas();
    // Truco necesario en móvil (Android/iOS): muchos navegadores no
    // "decodifican" de verdad el vídeo para poder leerlo con canvas
    // hasta que se ha intentado reproducir al menos un instante.
    // Lo reproducimos y pausamos enseguida, en silencio, sin que el
    // usuario lo note.
    const kickstart = video.play();
    if (kickstart && typeof kickstart.then === 'function') {
      kickstart.then(() => video.pause()).catch(() => {
        // Si el navegador bloquea el play() automático, igualmente
        // intentamos pintar el primer frame por si ya es legible.
        onScroll();
      });
    } else {
      video.pause();
    }
    onScroll();
  });

  function resizeCanvas() {
    if (!video.videoWidth) return;
    const maxSize = Math.min(window.innerWidth, window.innerHeight) * 0.9;
    const scale = maxSize / Math.max(video.videoWidth, video.videoHeight);
    canvasW = Math.round(video.videoWidth * scale);
    canvasH = Math.round(video.videoHeight * scale);
    canvas.width = canvasW;
    canvas.height = canvasH;
  }

  function onScroll() {
    if (!duration) return;
    const rect = wrapper.getBoundingClientRect();
    const total = wrapper.offsetHeight - window.innerHeight;
    const scrolled = -rect.top;
    let progress = scrolled / total;
    progress = Math.max(0, Math.min(1, progress));
    targetTime = progress * duration;

    // El logo aparece a partir de que el batido ya está mezclándose
    // (ajusta el 0.55 si quieres que salga antes/después en el scroll)
    logoOverlay.style.opacity = progress > 0.55 ? '1' : '0';
    logoOverlay.style.transition = 'opacity 0.4s ease';

    scheduleSeek();
  }

  function scheduleSeek() {
    if (rafScheduled) return;
    rafScheduled = true;
    requestAnimationFrame(() => {
      rafScheduled = false;
      if (Math.abs(targetTime - renderedTime) > 1 / 30) {
        renderedTime = targetTime;
        video.currentTime = targetTime;
      }
    });
  }

  video.addEventListener('seeked', drawKeyedFrame);

  function drawKeyedFrame() {
    if (!canvasW) return;
    ctx.drawImage(video, 0, 0, canvasW, canvasH);
    const frame = ctx.getImageData(0, 0, canvasW, canvasH);
    const data = frame.data;

    // Máscara de la mano: en vez de un rectángulo duro (que se veía
    // como un corte recto poco natural), usamos un óvalo con borde
    // difuminado — transparente del todo en el centro de la esquina,
    // y se funde suavemente hacia el resultado normal del croma. Así
    // nunca hay un filo recto, y si el scoop roza esa zona se desvanece
    // en vez de cortarse en seco.
    const sx = canvasW / video.videoWidth;
    const cutX = HAND_CUT_X * sx;

    for (let y = 0; y < canvasH; y++) {
      for (let x = 0; x < canvasW; x++) {
        const i = (y * canvasW + x) * 4;

        if (x < cutX) {
          data[i + 3] = 0;
          continue;
        }

        const r = data[i], g = data[i + 1], b = data[i + 2];
        const maxRB = Math.max(r, b);

        const diff = g - maxRB;
        let alpha = 1 - (diff - SOFTNESS_LO) / (SOFTNESS_HI - SOFTNESS_LO);
        alpha = Math.max(0, Math.min(1, alpha));
        data[i + 3] = Math.round(alpha * 255);

        if (alpha > 0 && alpha < 1 && g > maxRB) {
          data[i + 1] = maxRB;
        }
      }
    }

    ctx.putImageData(frame, 0, 0);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', () => { resizeCanvas(); drawKeyedFrame(); });
})();
</script>
